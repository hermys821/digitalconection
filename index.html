  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            brand: '#00D4FF',   // Cyan principal
            dark: '#080C16',    // Fondo ultra oscuro
            card: '#111827',    // Gris azulado para tarjetas
            surface: '#1F2937'  // Detalles y hover

          animation: {
            'fade-up': 'fadeUp 0.6s ease forwards',
            'pulse-slow': 'pulse 3s infinite',
            'scroll': 'scroll 30s linear infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #080C16;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    .grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-6px);
    }

    input[type=search]::-webkit-search-cancel-button {
      display: none;
    }

    .skeleton {
      background: linear-gradient(90deg, #111827 25%, #1F2937 50%, #111827 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    /* Ocultar scrollbar para un look más limpio */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #080C16;
    }

    ::-webkit-scrollbar-thumb {
      background: #1F2937;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #00D4FF;
    }
  </style>
</head>

<body class="grain">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =============================================
    // CONFIGURACIÓN 
    // =============================================
    const CONFIG = {
      SHEET_ID: "1GKlRCGVZNGabKMx9Ps4jCnO3qxgDRRC_376T29i5OEk",

      { nombre: "Samsung Galaxy S24 Ultra", marca: "Samsung", precio: "1599999", stock: "5", imagen: "https://images.samsung.com/is/image/samsung/p6pim/ar/2401/gallery/ar-galaxy-s24-ultra-s928-sm-s928bztheab-thumb-539573033", descripcion: "S Pen integrado, 200MP, IA generativa", categoria: "Samsung" },

      { nombre: "Samsung Galaxy A55", marca: "Samsung", precio: "549999", stock: "20", imagen: "https://images.samsung.com/is/image/samsung/p6pim/ar/2401/gallery/ar-galaxy-a55-5g-sm-a556elgdeab-thumb-541127046", descripcion: "Exynos 1480, 50MP, agua y polvo IP67", categoria: "Samsung" },
      { nombre: "Xiaomi 14 Ultra", marca: "Xiaomi", precio: "1199999", stock: "3", imagen: "https://i01.appmifile.com/webfile/globalimg/products/pc/xiaomi-14-ultra/section1-img.png", descripcion: "Leica 50MP, Snapdragon 8 Gen 3, carga 90W", categoria: "Xiaomi" },

    function formatPrice(p) {
      const str = p.toString().trim();
      if (str.startsWith('$')) return str;
      return "$ " + str;
    }

    function StockBar({ stock }) {
      const n = parseInt(stock, 10) || 0;
      const max = 20;
      const pct = Math.min((n / max) * 100, 100);
      const color = n === 0 ? "#ef4444" : n <= 5 ? "#f59e0b" : "#00D4FF";

      return (
        <div>
          <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden mt-2">
            <div className="h-full rounded-full transition-all duration-500 ease-out" style={{ width: `${pct}%`, background: color }} />
          </div>
          <span className="text-xs mt-1.5 block font-medium tracking-wide" style={{ color }}>
            {n === 0 ? "Sin stock" : n <= 5 ? `⚡ Últimas ${n} unidades` : `✓ Stock disponible: ${n}`}
          </span>
        </div>
      );
    }

    function ProductCard({ product, onWA, onImageClick }) {
      const [imgError, setImgError] = useState(false);
      const inStock = parseInt(product.stock, 10) > 0;

      return (
        <div className="card-hover rounded-2xl overflow-hidden flex flex-col bg-card border border-white/5 shadow-lg relative">
          <div
            className="relative overflow-hidden cursor-pointer group bg-[#0A0A0A] aspect-[4/3]"
            onClick={() => {
              if (!imgError && product.imagen) onImageClick(product.imagen);
            }}
          >
            {!imgError && product.imagen && (
              <div className="absolute inset-0 z-10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40 backdrop-blur-sm">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /><line x1="11" y1="8" x2="11" y2="14" /><line x1="8" y1="11" x2="14" y2="11" />
                </svg>
              </div>
            )}

            {!imgError ? (
              <div className="w-full h-full p-6 flex items-center justify-center">
                <img
                  src={product.imagen}
                  alt={product.nombre}
                  className="max-w-full max-h-full object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-2xl"

                />
              </div>
            ) : (
              <div className="w-full h-full flex items-center justify-center text-gray-700">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1">
                  <rect x="2" y="4" width="20" height="16" rx="2" /><circle cx="8.5" cy="9.5" r="1.5" /><path d="m21 15-5-5L5 20" />
                </svg>
              </div>
            )}

            <div className="absolute top-3 left-3 z-20">
              <span className="text-xs font-bold px-3 py-1 rounded-full bg-dark/80 text-brand border border-brand/20 backdrop-blur-md">
                {product.marca}
              </span>
            </div>

            {!inStock && (
              <div className="absolute inset-0 flex items-center justify-center bg-black/70 z-20 backdrop-blur-sm">
                <span className="font-display text-3xl tracking-widest text-red-500 border-2 border-red-500 px-4 py-1 rounded-lg transform -rotate-12">AGOTADO</span>

          <div className="p-5 flex flex-col flex-1">

            {product.descripcion && <p className="text-sm mb-4 leading-relaxed text-gray-400 flex-1">{product.descripcion}</p>}

            <div className="mt-auto border-t border-white/5 pt-4">
              <div className="font-display text-3xl tracking-wide mb-1 text-white">
                {formatPrice(product.precio)}
              </div>

              <StockBar stock={product.stock} />

              <button
                onClick={() => onWA(product)}
                disabled={!inStock}
                className={`mt-5 w-full flex items-center justify-center gap-2 rounded-xl py-3.5 font-bold text-sm transition-all duration-300 ${inStock
                  ? "bg-brand text-dark hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(0,212,255,0.3)]"
                  : "bg-gray-800 text-gray-500 cursor-not-allowed"
                  }`}
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

                  <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.529 5.857L0 24l6.335-1.499A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.857 9.857 0 0 1-5.031-1.378l-.361-.214-3.741.984.998-3.652-.236-.373A9.846 9.846 0 0 1 2.118 12C2.118 6.533 6.533 2.118 12 2.118c5.467 0 9.882 4.415 9.882 9.882 0 5.467-4.415 9.882-9.882 9.882z" />
                </svg>
                {inStock ? "Lo quiero" : "Sin Stock"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SkeletonCard() {
      return (
        <div className="bg-card rounded-2xl overflow-hidden border border-white/5">
          <div className="skeleton h-[220px] w-full" />
          <div className="p-5 space-y-3">
            <div className="skeleton h-3 w-20 rounded" />
            <div className="skeleton h-5 w-4/5 rounded" />
            <div className="skeleton h-3 w-3/4 rounded" />
            <div className="skeleton h-7 w-2/5 rounded mt-4" />
            <div className="skeleton h-12 w-full rounded-xl mt-2" />
          </div>
        </div>
      );
    }

    function BrandCarousel() {
      // Usamos SimpleIcons para cargar los logos oficiales en formato SVG color blanco
      const brands = [
        { name: "APPLE", icon: "https://cdn.simpleicons.org/apple/white" },
        { name: "SAMSUNG", icon: "https://cdn.simpleicons.org/samsung/white" },
        { name: "MOTOROLA", icon: "https://cdn.simpleicons.org/motorola/white" },
        { name: "XIAOMI", icon: "https://cdn.simpleicons.org/xiaomi/white" },
        { name: "GOOGLE", icon: "https://cdn.simpleicons.org/google/white" },
        { name: "HONOR", icon: "https://cdn.simpleicons.org/honor/white" },
        { name: "ONEPLUS", icon: "https://cdn.simpleicons.org/oneplus/white" },
        { name: "NUBIA", icon: null },
        { name: "REALME", icon: "https://cdn.simpleicons.org/realme/white" }
      ];

      const duplicatedBrands = [...brands, ...brands];

      return (
        <div className="w-full bg-dark border-y border-white/5 py-8 overflow-hidden relative flex items-center mb-16 mt-4">
          <div className="absolute left-0 top-0 bottom-0 w-24 bg-gradient-to-r from-dark to-transparent z-10 pointer-events-none"></div>
          <div className="absolute right-0 top-0 bottom-0 w-24 bg-gradient-to-l from-dark to-transparent z-10 pointer-events-none"></div>

          <div className="flex w-max animate-scroll gap-20 px-10 items-center">
            {duplicatedBrands.map((brand, index) => (
              <div key={index} className="flex items-center justify-center gap-4 opacity-30 hover:opacity-100 transition-opacity duration-300 cursor-default">
                {brand.icon && (
                  <img src={brand.icon} alt={`Logo ${brand.name}`} className="h-9 w-auto object-contain" />
                )}
                <span className="font-display text-4xl tracking-widest text-white">{brand.name}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState("Todos");
      const [sortBy, setSortBy] = useState("default");
      const [usingDemo, setUsingDemo] = useState(false);
      const [selectedImage, setSelectedImage] = useState(null);
      const heroRef = useRef(null);

      useEffect(() => {
        fetchProducts();
      }, []);

      function fetchProducts() {
        if (CONFIG.SHEET_ID === "TU_SHEET_ID_AQUI") {
          setTimeout(() => {
            setProducts(DEMO_PRODUCTS);
            setUsingDemo(true);
            setLoading(false);
          }, 1200);
          return;
        }

        // Definimos la función de error por si falla
        const mostrarError = () => {
          setError("No se pudo conectar con Google Sheets. Verificá el Sheet ID y que el documento sea público.");
          setProducts(DEMO_PRODUCTS);
          setUsingDemo(true);
          setLoading(false);
        };

        // Método JSONP: Evita errores de CORS al abrir la web localmente (file://)
        window.google = window.google || {};
        window.google.visualization = window.google.visualization || {};
        window.google.visualization.Query = {
          setResponse: function (json) {
            try {
              const rows = json.table.rows;
              const parsed = rows.map(r => {
                let rawF = r.c[2]?.f || "";
                let rawV = r.c[2]?.v?.toString() || "";
                let finalPrecio = rawF || rawV || "0";
                if (finalPrecio.includes("VALUE") || finalPrecio.toLowerCase() === "value") {
                  finalPrecio = "Consultar";
                }

                return {
                  nombre: r.c[0]?.v || "",
                  marca: r.c[1]?.v || "",
                  precio: finalPrecio,
                  precioRaw: parseFloat(rawV) || 0,
                  stock: r.c[3]?.v?.toString() || "0",
                  imagen: r.c[4]?.v || "",
                  descripcion: r.c[5]?.v || "",
                  categoria: r.c[6]?.v || "",
                };
              }).filter(p => p.nombre && p.nombre.toLowerCase() !== "nombre");

              setProducts(parsed);
              setLoading(false);
            } catch (e) {
              console.error("Error al procesar los datos de Sheets:", e);
              mostrarError();
            }
          }
        };

        try {
          const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
          const script = document.createElement('script');
          script.src = url;
          script.onerror = mostrarError;
          document.head.appendChild(script);
        } catch (e) {
          console.error(e);
          mostrarError();
        }
      }

      function openWA(product) {
        const msg = `${CONFIG.WA_MSG}*${product.nombre}* — ${formatPrice(product.precio)}`;
        const url = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`;
        window.open(url, "_blank");
      }

      function openWAGeneral() {
        const url = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent("Hola! Quiero consultar sobre sus productos.")}`;
        window.open(url, "_blank");
      }

      const categorias = ["Todos", ...new Set(products.map(p => p.marca).filter(Boolean))];

      let filtered = products.filter(p => {
        const q = search.toLowerCase();
        const matchSearch = !q || p.nombre.toLowerCase().includes(q) || p.marca.toLowerCase().includes(q) || p.descripcion.toLowerCase().includes(q);
        const matchFilter = filter === "Todos" || p.marca === filter;
        return matchSearch && matchFilter;
      });

      if (sortBy === "precio-asc") filtered = [...filtered].sort((a, b) => {
        const pA = a.precioRaw !== undefined ? a.precioRaw : parseFloat(a.precio.toString().replace(/[^\d]/g, ""));
        const pB = b.precioRaw !== undefined ? b.precioRaw : parseFloat(b.precio.toString().replace(/[^\d]/g, ""));
        return pA - pB;
      });
      if (sortBy === "precio-desc") filtered = [...filtered].sort((a, b) => {
        const pA = a.precioRaw !== undefined ? a.precioRaw : parseFloat(a.precio.toString().replace(/[^\d]/g, ""));
        const pB = b.precioRaw !== undefined ? b.precioRaw : parseFloat(b.precio.toString().replace(/[^\d]/g, ""));
        return pB - pA;
      });
      if (sortBy === "stock") filtered = [...filtered].sort((a, b) => parseInt(b.stock) - parseInt(a.stock));

      const totalProductos = products.length;
      const enStock = products.filter(p => parseInt(p.stock) > 0).length;

      return (
        <div className="min-h-screen">

          {/* NAVBAR */}
          <nav className="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-4 bg-dark/80 backdrop-blur-md border-b border-white/5">
            <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
              <img src="logo.jpeg" alt="Logo" className="h-10 w-auto rounded border border-white/10" onError={(e) => { e.target.style.display = 'none'; }} />
              <div className="font-display text-2xl tracking-widest hidden sm:block text-white">
                DIGITAL<span className="text-brand">CONECTION</span>
              </div>
            </div>

            <div className="flex items-center gap-6">
              <button onClick={() => document.getElementById("catalogo").scrollIntoView({ behavior: "smooth" })}
                className="hidden md:block text-sm font-medium text-gray-300 hover:text-brand transition-colors">
                Ver Equipos
              </button>

              <button onClick={openWAGeneral} className="flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold text-white bg-[#25D366] hover:bg-[#1da851] transition-transform hover:scale-105 shadow-lg shadow-[#25D366]/20">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                  <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.529 5.857L0 24l6.335-1.499A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.857 9.857 0 0 1-5.031-1.378l-.361-.214-3.741.984.998-3.652-.236-.373A9.846 9.846 0 0 1 2.118 12C2.118 6.533 6.533 2.118 12 2.118c5.467 0 9.882 4.415 9.882 9.882 0 5.467-4.415 9.882-9.882 9.882z" />
                </svg>
                Consultanos
              </button>
            </div>
          </nav>

          {/* HERO */}
          <section ref={heroRef} className="pt-32 pb-20 px-6 relative overflow-hidden" style={{ minHeight: "80vh", display: "flex", alignItems: "center" }}>
            <div className="absolute top-[-10%] left-1/2 transform -translate-x-1/2 w-full max-w-3xl h-96 opacity-20 blur-[100px] pointer-events-none" style={{ background: "radial-gradient(circle, #00D4FF 0%, transparent 80%)" }} />

            {/* GRID LAYOUT: Text left, Visual right */}
            <div className="max-w-7xl mx-auto w-full grid grid-cols-1 xl:grid-cols-2 gap-12 items-center relative z-10">

              {/* TEXTO (IZQUIERDA) */}
              <div className="w-full text-center xl:text-left flex flex-col items-center xl:items-start relative z-10">
                <div className="inline-block px-4 py-1.5 rounded-full text-xs font-semibold mb-8 border border-brand/30 bg-brand/10 text-brand animate-fade-up">
                  🔥 {enStock} equipos listos para entregar hoy
                </div>

                <h1 className="font-display leading-[0.9] mb-6 text-white animate-fade-up" style={{ fontSize: "clamp(3.5rem, 8vw, 7rem)", animationDelay: "0.1s" }}>
                  TU PRÓXIMO CELULAR <br />
                  <span className="text-brand">AL MEJOR PRECIO</span>
                </h1>

                <p className="text-lg max-w-2xl mb-10 text-gray-400 font-light animate-fade-up" style={{ animationDelay: "0.2s" }}>
                  Dejá de dar vueltas. Encontrá la mejor tecnología con stock real, precios transparentes y atención personalizada por WhatsApp.
                </p>

                <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto animate-fade-up" style={{ animationDelay: "0.3s" }}>
                  <button onClick={() => document.getElementById("catalogo").scrollIntoView({ behavior: "smooth" })}
                    className="px-8 py-4 rounded-xl font-bold text-sm bg-brand text-dark transition-all hover:scale-105 hover:shadow-[0_0_20px_rgba(0,212,255,0.4)]">
                    Explorar Catálogo
                  </button>
                  <button onClick={openWAGeneral} className="flex items-center justify-center gap-2 px-8 py-4 rounded-xl font-bold text-sm text-white bg-white/5 border border-white/10 transition-all hover:bg-white/10 hover:border-brand/50">
                    Asesoramiento gratis
                  </button>
                </div>

                {/* Stats */}
                <div className="flex flex-wrap gap-10 mt-14 justify-center xl:justify-start animate-fade-up" style={{ animationDelay: "0.4s" }}>
                  {[
                    { label: "Equipos", value: totalProductos },
                    { label: "Stock", value: enStock },
                    { label: "Envío", value: "24h" },
                    { label: "Soporte", value: "Activo" },
                  ].map(s => (
                    <div key={s.label}>
                      <div className="font-display text-4xl text-brand">{s.value}</div>
                      <div className="text-sm tracking-wide text-gray-400">{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* COMPOSICIÓN VISUAL (DERECHA) */}
              <div className="hidden xl:flex relative justify-center items-center w-full h-[600px] animate-fade-up" style={{ animationDelay: "0.5s" }}>
                {/* Resplandor de fondo central */}
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] rounded-full" style={{ background: "#00D4FF", filter: "blur(140px)", opacity: 0.15, animation: "pulse 4s infinite" }}></div>

                {/* Celular Principal (Animación flotante) */}
                <div className="absolute z-20 w-[280px] h-[560px] rounded-[3rem] p-2 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8)] animate-float" style={{ background: "linear-gradient(145deg, #242424, #0A0A0A)", border: "1px solid #333", transform: "rotate(-6deg)" }}>
                  {/* Pantalla Interna */}
                  <div className="w-full h-full rounded-[2.5rem] overflow-hidden flex flex-col relative" style={{ background: "#080C16", border: "5px solid #000" }}>

                    {/* Dynamic Island */}
                    <div className="absolute top-2 left-1/2 -translate-x-1/2 w-24 h-7 bg-black rounded-full z-30 flex items-center justify-end px-3">
                      <div className="w-2.5 h-2.5 rounded-full bg-[#1A1A1A]"></div>
                    </div>

                    {/* Interfaz Simulada de la tienda */}
                    <div className="flex-1 w-full bg-gradient-to-b from-[#111827] to-[#080C16] pt-16 flex flex-col">
                      <div className="w-full px-5 pb-5 border-b border-white/5 space-y-3">
                        <div className="flex justify-between items-center">
                          <div className="w-8 h-8 rounded-full bg-brand/20"></div>
                          <div className="w-20 h-4 rounded-full bg-white/10"></div>
                        </div>
                        <div className="w-2/3 h-6 rounded-lg bg-white/10 mb-2"></div>
                        <div className="w-full h-32 rounded-xl bg-gradient-to-tr from-brand/10 to-transparent border border-brand/10"></div>
                      </div>

                      <div className="px-5 py-4 space-y-4">
                        <div className="flex gap-4 items-center">
                          <div className="w-16 h-16 rounded-xl bg-white/5"></div>
                          <div className="flex-1 space-y-2">
                            <div className="w-full h-3 rounded-full bg-white/10"></div>
                            <div className="w-2/3 h-3 rounded-full bg-white/5"></div>
                          </div>
                        </div>
                        <div className="flex gap-4 items-center">
                          <div className="w-16 h-16 rounded-xl bg-white/5"></div>
                          <div className="flex-1 space-y-2">
                            <div className="w-full h-3 rounded-full bg-white/10"></div>
                            <div className="w-2/3 h-3 rounded-full bg-white/5"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Tarjeta Flotante Pequeña Trasera */}
                <div className="absolute z-10 w-[240px] rounded-3xl p-6 shadow-2xl opacity-90 animate-float" style={{ background: "rgba(17, 24, 39, 0.7)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.1)", transform: "translateX(140px) translateY(100px) rotate(8deg)", animationDelay: "1s" }}>
                  <div className="flex items-center gap-4 mb-4">
                    <div className="w-10 h-10 rounded-full flex items-center justify-center bg-brand/20 text-brand">⚡</div>
                    <div>
                      <div className="text-xs text-brand tracking-widest font-bold">STOCK REAL</div>
                      <div className="text-sm font-medium mt-0.5 text-white">Actualizado</div>
                    </div>
                  </div>
                  <div className="space-y-3">
                    <div className="w-full h-2 rounded-full bg-white/10"></div>
                    <div className="w-3/4 h-2 rounded-full bg-white/10"></div>
                  </div>
                </div>

                {/* Etiqueta de Precio Flotante */}
                <div className="absolute z-30 rounded-2xl px-5 py-3 shadow-xl animate-float" style={{ background: "#00D4FF", color: "#0A0A0A", transform: "translateX(-130px) translateY(-50px) rotate(-10deg)", animationDelay: "2s" }}>
                  <div className="text-xs font-bold opacity-80 uppercase tracking-wider mb-1">Mejor Precio</div>
                  <div className="font-display text-3xl leading-none">GARANTIZADO</div>
                </div>

              </div>
            </div>
          </section>

          {/* ACÁ PONEMOS EL CARRUSEL INFINITO */}
          <BrandCarousel />

          {/* AVISO DEMO */}
          {usingDemo && (
            <div className="max-w-7xl mx-auto px-6 mb-8">
              <div className="p-4 rounded-xl flex items-start gap-3 bg-brand/10 border border-brand/20">
                <span className="text-brand text-lg">⚙</span>
                <div>
                  <p className="text-sm font-semibold text-brand">Modo demo activo</p>
                  <p className="text-xs mt-1 text-gray-400">
                    Estás viendo datos de muestra. Para conectar tu Google Sheets abrí el archivo HTML, buscá la sección <code className="text-brand">CONFIG</code> y reemplazá <code className="text-brand">TU_SHEET_ID_AQUI</code> con el ID de tu planilla.
                  </p>
                </div>
              </div>
            </div>
          )}

          {/* CATÁLOGO */}
          <section id="catalogo" className="px-6 pb-24 max-w-7xl mx-auto">
            <div className="flex items-end justify-between mb-8 flex-wrap gap-4">
              <div>
                <h2 className="font-display text-4xl tracking-wide text-white">CATÁLOGO</h2>
                <p className="text-sm mt-1 text-gray-400">{filtered.length} producto{filtered.length !== 1 ? "s" : ""}</p>
              </div>

              <select
                value={sortBy}
                onChange={e => setSortBy(e.target.value)}
                className="text-sm px-4 py-2.5 rounded-xl outline-none bg-card text-white border border-white/10 focus:border-brand/50 transition-colors cursor-pointer"
              >
                <option value="default">Ordenar por</option>
                <option value="precio-asc">Menor precio</option>
                <option value="precio-desc">Mayor precio</option>
                <option value="stock">Mayor stock</option>
              </select>
            </div>

            {/* BUSCADOR */}
            <div className="relative mb-6">
              <svg className="absolute left-4 top-1/2 -translate-y-1/2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2">
                <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
              </svg>
              <input
                type="search"
                placeholder="Buscar celular, marca..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                className="w-full pl-12 pr-4 py-3.5 rounded-xl text-sm outline-none bg-card text-white border border-white/10 focus:border-brand/50 transition-colors"
              />
              {search && (
                <button onClick={() => setSearch("")} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">✕</button>
              )}
            </div>

            {/* FILTROS */}
            <div className="flex flex-wrap gap-2 mb-10">
              {categorias.map(c => (
                <button
                  key={c}
                  onClick={() => setFilter(c)}
                  className={`px-5 py-2 rounded-full text-sm font-medium transition-all ${filter === c
                    ? "bg-brand text-dark shadow-[0_0_15px_rgba(0,212,255,0.3)]"
                    : "bg-card text-gray-400 border border-white/5 hover:border-white/20 hover:text-white"
                    }`}
                >
                  {c}
                </button>
              ))}
            </div>

            {/* GRID */}
            {loading ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                {Array.from({ length: 8 }).map((_, i) => <SkeletonCard key={i} />)}
              </div>
            ) : filtered.length === 0 ? (
              <div className="text-center py-24 bg-card rounded-3xl border border-white/5">
                <div className="text-5xl mb-4">📱</div>
                <p className="font-display text-2xl text-gray-300">SIN RESULTADOS</p>
                <p className="text-sm mt-2 text-gray-500">Probá con otra búsqueda o filtro</p>
                <button onClick={() => { setSearch(""); setFilter("Todos"); }} className="mt-6 px-6 py-2.5 rounded-full text-sm font-bold bg-brand text-dark">
                  Ver todo el catálogo
                </button>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                {filtered.map((p, i) => <ProductCard key={i} product={p} onWA={openWA} onImageClick={setSelectedImage} />)}
              </div>
            )}

            {error && (
              <p className="mt-6 text-sm text-center text-red-400 bg-red-400/10 py-3 rounded-lg border border-red-400/20">⚠ {error}</p>
            )}
          </section>

          {/* CTA FINAL */}
          <section className="px-6 pb-24 max-w-4xl mx-auto text-center">
            <div className="rounded-3xl p-12 bg-card border border-brand/30 relative overflow-hidden">
              <div className="absolute top-0 left-1/2 transform -translate-x-1/2 w-full h-full opacity-10 pointer-events-none" style={{ background: "radial-gradient(circle, #00D4FF 0%, transparent 70%)" }} />

              <div className="relative z-10">
                <p className="font-display text-5xl mb-4 text-brand">¿NO ENCONTRÁS<br />LO QUE BUSCÁS?</p>
                <p className="text-sm mb-8 text-gray-400">Escribinos y te ayudamos a encontrar el celular ideal para vos al mejor precio.</p>
                <button onClick={openWAGeneral} className="inline-flex items-center gap-3 px-10 py-4 rounded-full font-bold text-base text-white bg-[#25D366] hover:bg-[#1da851] transition-transform hover:scale-105 shadow-lg shadow-[#25D366]/20">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.529 5.857L0 24l6.335-1.499A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.857 9.857 0 0 1-5.031-1.378l-.361-.214-3.741.984.998-3.652-.236-.373A9.846 9.846 0 0 1 2.118 12C2.118 6.533 6.533 2.118 12 2.118c5.467 0 9.882 4.415 9.882 9.882 0 5.467-4.415 9.882-9.882 9.882z" />
                  </svg>
                  Escribinos por WhatsApp
                </button>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="px-6 py-8 text-center border-t border-white/5 bg-dark">
            <p className="font-display text-2xl tracking-widest mb-2 text-brand">{CONFIG.STORE_NAME}</p>
            <p className="text-xs text-gray-500">© {new Date().getFullYear()} · Todos los precios en pesos argentinos · Stock sujeto a disponibilidad</p>
          </footer>

          {/* BOTÓN WA FLOTANTE */}
          <button
            onClick={openWAGeneral}
            className="fixed bottom-6 right-6 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl z-50 bg-[#25D366] hover:bg-[#1da851] transition-transform hover:scale-110"
            style={{ boxShadow: "0 4px 24px rgba(37,211,102,0.4)" }}
            title="WhatsApp"
          >
            <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.529 5.857L0 24l6.335-1.499A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.857 9.857 0 0 1-5.031-1.378l-.361-.214-3.741.984.998-3.652-.236-.373A9.846 9.846 0 0 1 2.118 12C2.118 6.533 6.533 2.118 12 2.118c5.467 0 9.882 4.415 9.882 9.882 0 5.467-4.415 9.882-9.882 9.882z" />
            </svg>
          </button>

          {/* VISOR DE IMAGEN (MODAL) */}
          {selectedImage && (
            <div
              className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-8"
              style={{ background: "rgba(8,12,22,0.9)", backdropFilter: "blur(8px)" }}
              onClick={() => setSelectedImage(null)}
            >
              <div className="relative max-w-5xl w-full h-full flex items-center justify-center">
                <button
                  onClick={() => setSelectedImage(null)}
                  className="absolute top-0 right-0 md:-top-4 md:-right-4 w-12 h-12 rounded-full flex items-center justify-center z-10 transition-transform hover:scale-110 bg-white/10 text-white border border-white/20 hover:bg-white/20"
                >
                  ✕
                </button>
                <img
                  src={selectedImage}
                  alt="Vista ampliada"
                  className="max-w-full max-h-full object-contain rounded-xl shadow-[0_0_50px_rgba(0,212,255,0.15)]"
                  onClick={(e) => e.stopPropagation()}
                />
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
